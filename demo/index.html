<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TubePlayer — Demo</title>
  <link rel="icon" type="image/png" href="./tubeplayer-logo.png" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      overflow-x: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      width: 40%;
      height: 40%;
      background: radial-gradient(circle, rgba(255, 0, 0, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 600px;
      width: 100%;
      padding: 20px;
    }

    .logo-wrap {
      margin-top: -40px;
      margin-bottom: 40px;
      animation: fadeInDown 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .logo-wrap img {
      width: 330px;
      height: auto;
      filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.5));
    }

    h1 {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      animation: fadeIn 1s ease-out 0.2s both;
    }

    h1 span {
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #ff4d4d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.desc {
      color: #999;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 40px;
      animation: fadeIn 1s ease-out 0.4s both;
    }

    .demo-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
    }

    .btn--github svg {
      fill: #fff !important;
    }

    .btn--github:hover {
      border-color: rgba(255, 255, 255, 0.4);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 77, 77, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn svg {
      width: 20px;
      height: 20px;
      fill: #ff4d4d;
    }

    .shortcuts {
      margin-top: 60px;
      padding: 24px 32px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 14px;
      color: #777;
      animation: fadeIn 1s ease-out 0.8s both;
    }

    .shortcuts h3 {
      color: #aaa;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .shortcuts ul {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      text-align: left;
    }

    .shortcuts li {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .shortcuts kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 6px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      color: #ccc;
      box-shadow: 0 2px 0 rgba(0,0,0,0.5);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .shortcuts ul {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-wrap">
      <img src="./tubeplayer-logo.png" alt="TubePlayer Logo" />
    </div>

    <h1><span>TubePlayer</span> Demo</h1>
    <p class="desc">
      프레임워크에 구애받지 않는 Vanilla JS 기반의<br />
      커스텀 YouTube 팝업 플레이어 라이브러리입니다.
    </p>

    <div class="demo-buttons">
      <button class="btn" data-tube-open="trailer">
        <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
        데모 열기
      </button>
      <a href="https://github.com/hellomrma/tube-player" target="_blank" class="btn btn--github">
        <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </a>
    </div>

    <div class="shortcuts">
      <h3>Keyboard Shortcuts</h3>
      <ul>
        <li><kbd>Space</kbd> 재생 / 일시정지</li>
        <li><kbd>Esc</kbd> 레이어 닫기</li>
        <li><kbd>M</kbd> 음소거 토글</li>
        <li><kbd>F</kbd> 전체화면 토글</li>
      </ul>
    </div>
  </div>

  <!-- Layer & Player -->
  <div data-tube-layer="trailer"
       data-tube-close-on-dim="true"
       data-tube-animation="fade">
    <div data-tube-youtube="B868ddnPpsc"
         data-tube-autoplay="true"
         data-tube-theme="dark"
         data-tube-controls="mute,fullscreen">
    </div>
  </div>

  <script type="module">
    import TubePlayer from '../src/index.js';

    TubePlayer.init();

    // 이벤트 리스닝 예시
    const trailer = TubePlayer.get('trailer');
    if (trailer) {
      trailer.on('layer:open', () => console.log('[demo] 레이어 열림'));
      trailer.on('layer:close', () => console.log('[demo] 레이어 닫힘'));
      trailer.on('video:play', () => console.log('[demo] 재생 시작'));
    }
  </script>

</body>
</html>
